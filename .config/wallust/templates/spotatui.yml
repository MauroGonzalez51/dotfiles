keybindings:
    back: q
    next_page: ctrl-d
    previous_page: ctrl-u
    jump_to_start: ctrl-a
    jump_to_end: ctrl-e
    jump_to_album: a
    jump_to_artist_album: A
    jump_to_context: o
    manage_devices: d
    decrease_volume: "-"
    increase_volume: +
    toggle_playback: space
    seek_backwards: <
    seek_forwards: ">"
    next_track: n
    previous_track: p
    help: "?"
    shuffle: ctrl-s
    repeat: ctrl-r
    search: /
    submit: enter
    copy_song_url: c
    copy_album_url: C
    audio_analysis: v
    basic_view: B
    add_item_to_queue: z
    open_settings: alt-,
    save_settings: alt-s

behavior:
    seek_milliseconds: 5000
    volume_increment: 10
    volume_percent: 100
    tick_rate_milliseconds: 16
    enable_text_emphasis: true
    show_loading_indicator: true
    enforce_wide_search_bar: true
    enable_global_song_count: true
    enable_discord_rpc: true
    discord_rpc_client_id: null
    enable_announcements: true
    announcement_feed_url: null
    seen_announcement_ids:
        - 2026-02-16-announcements-live
    shuffle_enabled: false
    liked_icon: ♥
    shuffle_icon: 🔀
    repeat_track_icon: 🔂
    repeat_context_icon: 🔁
    playing_icon: ▶
    paused_icon: ⏸
    set_window_title: true
    visualizer_style: Equalizer

theme:
    active: {{ color6 | rgb }}
    banner: {{ color6 | rgb }}
    error_border: {{ color1 | rgb }}
    error_text: {{ color1 | rgb }}
    hint: {{ color3 | rgb }}
    hovered: {{ color6 | rgb }}
    inactive: {{ color8 | rgb }}
    playbar_background: Reset
    playbar_progress: {{ color6 | rgb }}
    playbar_progress_text: {{ color0 | rgb }}
    playbar_text: {{ foreground | rgb }}
    selected: {{ color1 | rgb }}
    text: {{ foreground | rgb }}
    background: Reset
    header: {{ color6 | rgb }}
    highlighted_lyrics: {{ color6 | rgb }}
