source = ~/.config/hypr/themes/wallust.conf

$font = JetBrainsMono Nerd Font

general {
    ignore_empty_input = true
    hide_cursor = true
}

background {
    path = screenshot
    blur_passes = 3
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=en_US.UTF-8 date +"%A, %B %d")"
    color = $color1
    font_size = 25
    font_family = $font
    position = 0, 350
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $color2
    font_size = 120
    font_family = $font
    position = 0, 230
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] echo "$(uptime -p)"
    color = $color2
    font_size = 14
    position = 0, -350
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = $foreground
    font_color = $background
    fade_on_empty = false
    font_family = $font
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}
